<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Yale SOM Course Planner">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001d3d"/>
      <stop offset="55%" stop-color="#002a54"/>
      <stop offset="100%" stop-color="#00356b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" fill="#8fa3bc" opacity="0.45"/>
  <text x="80" y="200" fill="#e8edf3" font-family="system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="28" font-weight="600" letter-spacing="0.04em">YALE SOM</text>
  <text x="80" y="300" fill="#ffffff" font-family="system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="700">Course Planner</text>
  <text x="80" y="390" fill="#b8c5d6" font-family="system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="34" font-weight="400">Search courses, weekly calendar, requirement tags</text>
  <g transform="translate(80, 450)">
    <rect x="0" y="0" width="220" height="52" rx="8" fill="#ffffff" opacity="0.12"/>
    <text x="24" y="35" fill="#e8edf3" font-family="system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="600">Student-run, free</text>
  </g>
  <g transform="translate(880, 120)" opacity="0.18">
    <rect x="0" y="0" width="240" height="160" rx="12" fill="none" stroke="#ffffff" stroke-width="3"/>
    <line x1="0" y1="40" x2="240" y2="40" stroke="#ffffff" stroke-width="3"/>
    <line x1="60" y1="40" x2="60" y2="160" stroke="#ffffff" stroke-width="3"/>
    <rect x="72" y="56" width="148" height="36" rx="6" fill="#ffffff"/>
    <rect x="72" y="104" width="100" height="36" rx="6" fill="#ffffff"/>
  </g>
</svg>
